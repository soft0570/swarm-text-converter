<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Swarm Text Converter</title>
  <style>
    :root {
      --bg: #f3f4f6;
      --card: #ffffff;
      --text: #111827;
      --sub: #6b7280;
      --border: #d1d5db;
      --button: #111827;
      --buttonSub: #6b7280;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 16px;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
    }

    .card {
      background: var(--card);
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.06);
    }

    h1 {
      margin: 0 0 10px 0;
      font-size: 2rem;
      line-height: 1.2;
    }

    p.desc {
      margin: 0 0 16px 0;
      color: var(--sub);
      line-height: 1.6;
    }

    textarea {
      width: 100%;
      min-height: 220px;
      resize: vertical;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      font-size: 16px;
      line-height: 1.5;
      background: white;
      margin-bottom: 14px;
    }

    .buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 14px;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 15px;
      cursor: pointer;
      color: white;
      background: var(--button);
    }

    button.secondary {
      background: var(--buttonSub);
    }

    .output {
      min-height: 100px;
      white-space: pre-wrap;
      word-break: break-word;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: #fafafa;
      padding: 14px;
      font-size: 16px;
      line-height: 1.6;
    }

    .note {
      margin-top: 14px;
      color: var(--sub);
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .ok {
      color: #065f46;
    }

    .warn {
      color: #92400e;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>Swarm Text Converter</h1>
      <p class="desc">
        Swarm / Foursquare の共有文を、短い投稿用テキストに変換します。
      </p>

      <textarea id="input" placeholder="ここにSwarmの共有文を貼り付けてください"></textarea>

      <div class="buttons">
        <button onclick="convertText()">変換</button>
        <button class="secondary" onclick="pasteText()">ペースト</button>
        <button class="secondary" onclick="copyResult()">コピー</button>
        <button class="secondary" onclick="postToX()">Xに投稿</button>
        <button class="secondary" onclick="clearAll()">クリア</button>
      </div>

      <div id="output" class="output">ここに変換結果が表示されます</div>

      <div class="note">
        <div>・イベント名がある場合 → <span class="ok">イベント名 (@ 会場 in 区, 都道府県) URL</span></div>
        <div>・イベント名がない場合 → <span class="ok">I'm at 会場 in 区, 都道府県 URL</span></div>
      </div>
    </div>
  </div>

  <script>
    function normalizeUrl(text) {
    const preferred = text.match(
        /https?:\/\/(?:app\.foursquare\.com|(?:www\.)?swarmapp\.com)\/share\/checkin\/\S+/i
    );

    const anyUrl = text.match(/https?:\/\/\S+/i);
    const raw = preferred ? preferred[0] : (anyUrl ? anyUrl[0] : "");

    if (!raw) return "";

    return raw
        .replace("app.foursquare.com", "swarmapp.com")
        .replace("www.swarmapp.com", "swarmapp.com")
        .replace(/lang=ja\b/i, "lang=en");
    }
    function extractEvent(text) {
    // まずは " から 「この https://」の直前まで
    let match = text.match(/"([\s\S]*?)この\s+https?:\/\//);

    // 保険: 取れなければ " から 空行または末尾まで
    if (!match) {
        match = text.match(/"([\s\S]*?)(?:\n\n|$)/);
    }

    if (!match) return "";

    const lines = match[1]
        .split("\n")
        .map(line => line.trim())
        .filter(line => line.length > 0);

    // 2行まで結合
    return lines.slice(0, 2).join(" ");
    }
    function extractLocationBlock(text) {
    const match = text.match(/^\((.+)\)\s*$/m);
    return match ? match[1].trim() : "";
    }

    function extractVenue(locationText) {
    if (!locationText) return "";

    const beforeFirstComma = locationText.split(",")[0].trim();

    // 住所やフロア表記っぽい部分の前を会場名とみなす
    const match = beforeFirstComma.match(/^(.*?)(?:\s+[^\s]*\d.*)?$/);
    if (match) {
        return match[1].trim();
    }

    return beforeFirstComma;
    }

    function extractArea(locationText) {
      if (!locationText) {
        return { ward: "", prefecture: "" };
      }

      const parts = locationText.split(",").map(s => s.trim());
      return {
        ward: parts[1] || "",
        prefecture: parts[2] || ""
      };
    }

    function buildResult(text) {
      const event = extractEvent(text);
      const locationText = extractLocationBlock(text);
      const venue = extractVenue(locationText);
      const area = extractArea(locationText);
      const url = normalizeUrl(text);

      if (!venue) {
        return "場所情報を見つけられませんでした。Swarm の共有文をそのまま貼り付けてください。";
      }

      if (event) {
        return `${event} (@ ${venue} in ${area.ward}, ${area.prefecture}) ${url}`.trim();
      }

      return `I'm at ${venue} in ${area.ward}, ${area.prefecture} ${url}`.trim();
    }

    function convertText() {
      const input = document.getElementById("input").value;
      const result = buildResult(input);
      document.getElementById("output").textContent = result;
    }
    
    async function pasteText() {
        try {
        const clipText = await navigator.clipboard.readText();

        if (!clipText) {
            alert("クリップボードにテキストがありません");
            return;
        }

        document.getElementById("input").value = clipText;

        // ペーストしたら自動で変換したいならこれを有効にする
        convertText();

        } catch (e) {
        alert("ペーストに失敗しました。ブラウザの許可設定を確認してください。");
        console.error(e);
        }
    }

    async function copyResult() {
      const text = document.getElementById("output").textContent.trim();
      if (!text || text === "ここに変換結果が表示されます") {
        alert("まだ結果がありません");
        return;
      }

      try {
        await navigator.clipboard.writeText(text);
        alert("コピーしました");
      } catch (e) {
        alert("コピーに失敗しました");
      }
    }

    function postToX() {
        const text = document.getElementById("output").textContent.trim();

        if (!text || text === "ここに変換結果が表示されます") {
        alert("先に変換してください");
        return;
        }

        const encodedText = encodeURIComponent(text);

        // どちらでもOK。x.com のほうを優先
        const url = `https://x.com/intent/post?text=${encodedText}`;

        window.open(url, "_blank");
    }


    function clearAll() {
      document.getElementById("input").value = "";
      document.getElementById("output").textContent = "ここに変換結果が表示されます";
      document.getElementById("input").focus();

    }
  </script>
</body>
</html>
