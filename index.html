<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Swarm Text Converter</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 24px;
      background: #f2f2f2;
      color: #111;
    }
    .box {
      max-width: 700px;
      margin: 0 auto;
      background: white;
      padding: 20px;
      border-radius: 12px;
    }
    textarea {
      width: 100%;
      min-height: 180px;
      margin-top: 12px;
      margin-bottom: 12px;
      font-size: 16px;
    }
    button {
      padding: 10px 14px;
      font-size: 16px;
    }
    #output {
      margin-top: 16px;
      white-space: pre-wrap;
      background: #fafafa;
      border: 1px solid #ddd;
      padding: 12px;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Swarm Text Converter</h1>
    <p>テスト表示です。これが見えたら GitHub Pages は正常です。</p>

    <textarea id="input" placeholder="ここに共有文を貼り付け"></textarea>
    <br>
    <button onclick="run()">変換テスト</button>

    <div id="output">ここに結果が出ます</div>
  </div>

  <script>
    function run() {
      const input = document.getElementById("input").value;
      document.getElementById("output").textContent = input || "入力なし";
    }
  </script>
</body>
</html>
