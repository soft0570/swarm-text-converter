<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Swarm Text Converter</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 16px;
      background: #f7f7f8;
      color: #111;
    }
    .container {
      max-width: 720px;
      margin: 0 auto;
    }
    h1 {
      font-size: 1.4rem;
      margin-bottom: 8px;
    }
    p {
      color: #555;
      line-height: 1.5;
    }
    textarea {
      width: 100%;
      min-height: 220px;
      padding: 12px;
      border-radius: 12px;
      border: 1px solid #ccc;
      box-sizing: border-box;
      font-size: 16px;
      resize: vertical;
      margin-top: 12px;
      margin-bottom: 12px;
      background: white;
    }
    .buttons {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    button {
      border: none;
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 15px;
      cursor: pointer;
      background: #111827;
      color: white;
    }
    button.secondary {
      background: #6b7280;
    }
    .output {
      background: white;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 12px;
      min-height: 80px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .note {
      font-size: 0.9rem;
      color: #666;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="container">
